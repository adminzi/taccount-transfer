<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>타계정대체 Decision Tree</title>
<style>
  body { font-family: sans-serif; max-width: 720px; margin: 0 auto; padding: 32px 20px; background: #fff; color: #1a1a1a; }
  h2 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #888; margin-bottom: 32px; }
  .step-label { font-size: 11px; font-weight: 600; letter-spacing: .06em; color: #888; text-transform: uppercase; margin-bottom: 8px; }
  .chip-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
  .chip { padding: 8px 16px; border-radius: 999px; border: 1px solid #ddd; background: #fff; color: #1a1a1a; font-size: 13px; cursor: pointer; transition: all .15s; }
  .chip:hover { background: #f5f5f5; border-color: #bbb; }
  .chip.active { background: #e8f0fe; border-color: #4a7cf7; color: #1a56db; font-weight: 600; }
  .chip.easter { border-color: #ffb347; color: #e67e00; }
  .chip.easter:hover { background: #fff4e0; border-color: #e67e00; }
  .chip.easter.active { background: #fff4e0; border-color: #e67e00; color: #e67e00; }
  .search-wrap { margin-bottom: 12px; }
  .search-input { width: 100%; padding: 9px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; box-sizing: border-box; outline: none; }
  .search-input:focus { border-color: #4a7cf7; }
  .no-result { font-size: 13px; color: #aaa; margin-bottom: 24px; }
  .connector { display: flex; align-items: center; gap: 6px; color: #bbb; font-size: 12px; margin-bottom: 24px; }
  .connector-line { flex: 1; height: 1px; background: #eee; }
  .result-card { border: 1px solid #4a7cf7; border-radius: 12px; background: #e8f0fe; padding: 16px 20px; animation: fadeIn .25s ease; }
  .result-card.easter { border-color: #ffb347; background: #fff4e0; animation: shake .4s ease, fadeIn .25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
  .result-badge { font-size: 11px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: #1a56db; margin-bottom: 6px; display: block; }
  .result-badge.easter { color: #e67e00; }
  .result-title { font-size: 18px; font-weight: 600; color: #1a1a1a; margin: 0 0 8px; }
  .result-desc { font-size: 13px; color: #555; line-height: 1.6; margin: 0; }
  .reset-btn { margin-top: 16px; font-size: 12px; color: #888; cursor: pointer; text-decoration: underline; background: none; border: none; padding: 0; }
  .hidden { display: none; }

  /* 비밀번호 화면 */
  #lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
  #lock-screen h3 { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
  #lock-screen p { font-size: 13px; color: #888; margin-bottom: 24px; }
  #pw-input { padding: 10px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; width: 200px; text-align: center; outline: none; }
  #pw-input:focus { border-color: #4a7cf7; }
  #pw-btn { margin-top: 12px; padding: 10px 24px; background: #4a7cf7; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
  #pw-btn:hover { background: #3a6ce7; }
  #pw-error { margin-top: 10px; font-size: 12px; color: #e74c3c; display: none; }

</head>
<body>

<!-- 비밀번호 잠금 화면 -->
<div id="lock-screen">
  <h3>🔒 접근 제한</h3>
  <p>비밀번호를 입력해주세요.</p>
  <input type="password" id="pw-input" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter') checkPw()" />
  <button id="pw-btn" onclick="checkPw()">확인</button>
  <p id="pw-error">비밀번호가 올바르지 않습니다.</p>
</div>

<!-- 메인 콘텐츠 -->
<div id="main-content" class="hidden">
  <h2>타계정대체 Decision Tree</h2>
  <p class="sub">품목 계정과 처리 목적을 선택하면 계정대체 유형을 안내해드립니다.</p>

  <div id="step1">
    <div class="step-label">① 품목 계정 선택</div>
    <div class="chip-grid" id="account-chips"></div>
  </div>

  <div class="connector hidden" id="conn1">
    <div class="connector-line"></div>
    <span>↓</span>
    <div class="connector-line"></div>
  </div>

  <div id="step2" class="hidden">
    <div class="step-label">② 처리 목적 선택</div>
    <div class="search-wrap">
      <input class="search-input" type="text" id="search-input" placeholder="🔍 키워드 검색 (예: 폐기, 재고, 샘플)" oninput="filterPurposes()" />
    </div>
    <div class="chip-grid" id="purpose-chips"></div>
    <p class="no-result hidden" id="no-result">검색 결과가 없습니다.</p>
  </div>

  <div class="connector hidden" id="conn2">
    <div class="connector-line"></div>
    <span>↓</span>
    <div class="connector-line"></div>
  </div>

  <div id="step3" class="hidden">
    <div class="step-label">③ 계정대체 유형</div>
    <div class="result-card" id="result-card">
      <span class="result-badge" id="result-badge">대체유형</span>
      <p class="result-title" id="result-title"></p>
      <p class="result-desc" id="result-desc"></p>
    </div>
    <button class="reset-btn" onclick="reset()">↺ 처음부터 다시 선택</button>
  </div>
</div>

const PASSWORD = "wrw1020";

function checkPw() {
  const input = document.getElementById('pw-input').value;
  if (input === PASSWORD) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('main-content').classList.remove('hidden');
    sessionStorage.setItem('auth', 'true');
  } else {
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

let currentAcct = null;

function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

function renderAccounts() {
  const wrap = document.getElementById('account-chips');
  Object.keys(data).forEach(acct => {
    const c = document.createElement('button');
    c.className = 'chip';
    c.textContent = acct;
    c.onclick = () => selectAccount(acct);
    wrap.appendChild(c);
  });
}

function selectAccount(acct) {
  currentAcct = acct;
  document.querySelectorAll('#account-chips .chip').forEach(c => {
    c.classList.toggle('active', c.textContent === acct);
  });
  document.getElementById('search-input').value = '';
  hide('conn2'); hide('step3');
  renderPurposes(acct, '');
  show('conn1'); show('step2');
}

function filterPurposes() {
  const keyword = document.getElementById('search-input').value;
  if (currentAcct) renderPurposes(currentAcct, keyword);
  hide('conn2'); hide('step3');
}

function renderPurposes(acct, keyword) {
  const wrap = document.getElementById('purpose-chips');
  wrap.innerHTML = '';
  const noResult = document.getElementById('no-result');
  const purposes = Object.keys(data[acct]);
  const filtered = keyword
    ? purposes.filter(p => p.includes(keyword))
    : purposes;

  if (filtered.length === 0) {
    noResult.classList.remove('hidden');
  } else {
    noResult.classList.add('hidden');
    filtered.forEach(purpose => {
      const result = data[acct][purpose];
      const c = document.createElement('button');
      c.className = 'chip' + (result.easter ? ' easter' : '');
      c.textContent = purpose;
      c.onclick = () => selectPurpose(acct, purpose);
      wrap.appendChild(c);
    });
  }
}

function selectPurpose(acct, purpose) {
  document.querySelectorAll('#purpose-chips .chip').forEach(c => {
    c.classList.toggle('active', c.textContent === purpose);
  });
  const result = data[acct][purpose];
  const card = document.getElementById('result-card');
  const badge = document.getElementById('result-badge');
  card.className = 'result-card' + (result.easter ? ' easter' : '');
  badge.className = 'result-badge' + (result.easter ? ' easter' : '');
  badge.textContent = result.easter ? '🎉 이스터에그' : '대체유형';
  document.getElementById('result-title').textContent = result.type;
  document.getElementById('result-desc').textContent = result.desc;
  hide('step3'); show('conn2'); show('step3');
}

function reset() {
  currentAcct = null;
  hide('conn1'); hide('step2'); hide('conn2'); hide('step3');
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  document.getElementById('search-input').value = '';
  document.getElementById('no-result').classList.add('hidden');
}

renderAccounts();
