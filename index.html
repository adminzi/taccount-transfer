<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>타계정대체 Decision Tree</title>
<style>
  body { font-family: sans-serif; max-width: 720px; margin: 0 auto; padding: 32px 20px; background: #fff; color: #1a1a1a; }
  h2 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #888; margin-bottom: 32px; }
  .step-label { font-size: 11px; font-weight: 600; letter-spacing: .06em; color: #888; text-transform: uppercase; margin-bottom: 8px; }
  .chip-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
  .chip { padding: 8px 16px; border-radius: 999px; border: 1px solid #ddd; background: #fff; color: #1a1a1a; font-size: 13px; cursor: pointer; transition: all .15s; }
  .chip:hover { background: #f5f5f5; border-color: #bbb; }
  .chip.active { background: #e8f0fe; border-color: #4a7cf7; color: #1a56db; font-weight: 600; }
  .chip.easter { border-color: #ffb347; color: #e67e00; }
  .chip.easter:hover { background: #fff4e0; border-color: #e67e00; }
  .chip.easter.active { background: #fff4e0; border-color: #e67e00; color: #e67e00; }
  .connector { display: flex; align-items: center; gap: 6px; color: #bbb; font-size: 12px; margin-bottom: 24px; }
  .connector-line { flex: 1; height: 1px; background: #eee; }
  .result-card { border: 1px solid #4a7cf7; border-radius: 12px; background: #e8f0fe; padding: 16px 20px; animation: fadeIn .25s ease; }
  .result-card.easter { border-color: #ffb347; background: #fff4e0; animation: shake .4s ease, fadeIn .25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
  .result-badge { font-size: 11px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: #1a56db; margin-bottom: 6px; display: block; }
  .result-badge.easter { color: #e67e00; }
  .result-title { font-size: 18px; font-weight: 600; color: #1a1a1a; margin: 0 0 8px; }
  .result-desc { font-size: 13px; color: #555; line-height: 1.6; margin: 0; }
  .reset-btn { margin-top: 16px; font-size: 12px; color: #888; cursor: pointer; text-decoration: underline; background: none; border: none; padding: 0; }
  .hidden { display: none; }
</style>
</head>
<body>

<h2>타계정대체 Decision Tree</h2>
<p class="sub">품목 계정과 처리 목적을 선택하면 계정대체 유형을 안내해드립니다.</p>

<div id="step1">
  <div class="step-label">① 품목 계정 선택</div>
  <div class="chip-grid" id="account-chips"></div>
</div>

<div class="connector hidden" id="conn1">
  <div class="connector-line"></div>
  <span>↓</span>
  <div class="connector-line"></div>
</div>

<div id="step2" class="hidden">
  <div class="step-label">② 처리 목적 선택</div>
  <div class="chip-grid" id="purpose-chips"></div>
</div>

<div class="connector hidden" id="conn2">
  <div class="connector-line"></div>
  <span>↓</span>
  <div class="connector-line"></div>
</div>

<div id="step3" class="hidden">
  <div class="step-label">③ 계정대체 유형</div>
  <div class="result-card" id="result-card">
    <span class="result-badge" id="result-badge">대체유형</span>
    <p class="result-title" id="result-title"></p>
    <p class="result-desc" id="result-desc"></p>
  </div>
  <button class="reset-btn" onclick="reset()">↺ 처음부터 다시 선택</button>
</div>
